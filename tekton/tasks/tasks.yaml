---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: git-clone-task
  namespace: cicd
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
    - name: git-ssh-host
      type: string
      default: gitlab.itssolutions.it
    - name: git-ssh-port
      type: string
      default: "2424"
  workspaces:
    - name: output
    - name: ssh-directory
      optional: true
  results:
    - name: commit
      description: The precise commit SHA
    - name: url
      description: The precise URL
  steps:
    - name: clone
      image: registry.redhat.io/openshift-pipelines/pipelines-git-init-rhel8:latest
      env:
        - name: HOME
          value: /tekton/home
      script: |
        #!/usr/bin/env sh
        set -eu

        if [ -d "$(workspaces.ssh-directory.path)" ] && [ -f "$(workspaces.ssh-directory.path)/ssh-privatekey" ]; then
          mkdir -p ~/.ssh
          cp "$(workspaces.ssh-directory.path)"/ssh-privatekey ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
        Host $(params.git-ssh-host)
          Port $(params.git-ssh-port)
          StrictHostKeyChecking no
          IdentityFile ~/.ssh/id_ed25519
        Host *
          StrictHostKeyChecking no
          IdentityFile ~/.ssh/id_ed25519
        EOF
        fi

        CHECKOUT_DIR="$(workspaces.output.path)"
        rm -rf "${CHECKOUT_DIR:?}"/* "${CHECKOUT_DIR}"/.[!.]* "${CHECKOUT_DIR}"/..?* 2>/dev/null || true
        git clone "$(params.url)" "$CHECKOUT_DIR"
        cd "$CHECKOUT_DIR"
        git checkout "$(params.revision)"
        RESULT_SHA="$(git rev-parse HEAD)"
        printf "%s" "$RESULT_SHA" > "$(results.commit.path)"
        printf "%s" "$(params.url)" > "$(results.url.path)"
        echo "Cloned $(params.url) @ $RESULT_SHA"
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-tests-task
  namespace: cicd
spec:
  params:
    - name: app-dir
      type: string
      description: backend or frontend
  workspaces:
    - name: source
  steps:
    - name: validate
      image: node:20-alpine
      workingDir: $(workspaces.source.path)/$(params.app-dir)
      script: |
        #!/bin/sh
        set -eu
        echo "=== Installing dependencies for $(params.app-dir) ==="
        if [ -f package-lock.json ]; then npm ci; else npm install; fi

        echo "=== Building $(params.app-dir) ==="
        npm run build

        if find . \( -path './node_modules' -o -path './dist' \) -prune -o \( -name '*.spec.ts' -o -name '*.test.ts' -o -name '*.spec.tsx' -o -name '*.test.tsx' \) -print -quit | grep -q .; then
          echo "=== Running tests for $(params.app-dir) ==="
          npm test
        else
          echo "=== No test files found for $(params.app-dir); build validation passed ==="
        fi
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: buildah-build-push
  namespace: cicd
spec:
  params:
    - name: image
      description: Full image reference, registry/repo:tag
    - name: context
      description: Path to build context
      default: .
    - name: dockerfile
      description: Path to Dockerfile, relative to context
      default: ./Dockerfile
    - name: build-arg
      description: Extra build-arg, for example VITE_API_URL=https://api.example.com
      default: ""
    - name: tls-verify
      description: Verify TLS for registry
      default: "false"
  workspaces:
    - name: source
    - name: dockerconfig
      optional: true
  steps:
    - name: build-and-push
      image: registry.redhat.io/rhel8/buildah:latest
      workingDir: $(workspaces.source.path)/$(params.context)
      securityContext:
        privileged: true
      env:
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILDAH_FORMAT
          value: docker
      script: |
        #!/bin/bash
        set -euo pipefail

        if [ -f "$(workspaces.dockerconfig.path)/.dockerconfigjson" ]; then
          export REGISTRY_AUTH_FILE="$(workspaces.dockerconfig.path)/.dockerconfigjson"
        fi

        IMAGE="$(params.image)"
        DOCKERFILE="$(params.dockerfile)"
        BUILD_ARG="$(params.build-arg)"
        TLS_VERIFY="$(params.tls-verify)"

        BUILD_ARGS=()
        if [ -n "$BUILD_ARG" ]; then
          BUILD_ARGS+=(--build-arg "$BUILD_ARG")
        fi

        echo "=== Building image: $IMAGE ==="
        buildah bud \
          --storage-driver=vfs \
          --format=docker \
          "${BUILD_ARGS[@]}" \
          -f "$DOCKERFILE" \
          -t "$IMAGE" \
          .

        echo "=== Pushing image: $IMAGE ==="
        buildah push \
          --storage-driver=vfs \
          --tls-verify="$TLS_VERIFY" \
          "$IMAGE" \
          "docker://$IMAGE"
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: update-gitops-manifests
  namespace: cicd
spec:
  params:
    - name: git-url
      description: "GitOps repo URL. Recommended format: ssh://git@gitlab.itssolutions.it:2424/<group>/<repo>.git"
    - name: git-branch
      description: Target branch
      default: main
    - name: backend-image
      description: Backend image with tag
    - name: frontend-image
      description: Frontend image with tag
    - name: commit-sha
      description: Source commit SHA
    - name: git-ssh-host
      type: string
      default: gitlab.itssolutions.it
    - name: git-ssh-port
      type: string
      default: "2424"
  workspaces:
    - name: ssh-directory
  steps:
    - name: update-manifests
      image: alpine/git:latest
      env:
        - name: HOME
          value: /tekton/home
        - name: GIT_AUTHOR_NAME
          value: Tekton CI
        - name: GIT_AUTHOR_EMAIL
          value: tekton@itssolutions.it
        - name: GIT_COMMITTER_NAME
          value: Tekton CI
        - name: GIT_COMMITTER_EMAIL
          value: tekton@itssolutions.it
      script: |
        #!/bin/sh
        set -eu

        mkdir -p ~/.ssh
        cp "$(workspaces.ssh-directory.path)"/ssh-privatekey ~/.ssh/id_ed25519
        chmod 0600 ~/.ssh/id_ed25519
        cat > ~/.ssh/config <<EOF
        Host $(params.git-ssh-host)
          Port $(params.git-ssh-port)
          StrictHostKeyChecking no
          IdentityFile ~/.ssh/id_ed25519
        Host *
          StrictHostKeyChecking no
          IdentityFile ~/.ssh/id_ed25519
        EOF

        cd /tmp
        rm -rf gitops-repo
        git clone "$(params.git-url)" gitops-repo
        cd gitops-repo
        git checkout "$(params.git-branch)"

        BACKEND_IMAGE="$(params.backend-image)"
        FRONTEND_IMAGE="$(params.frontend-image)"
        COMMIT_SHA="$(params.commit-sha)"
        SHORT_SHA="$(printf "%s" "$COMMIT_SHA" | cut -c1-8)"
        BACKEND_TAG="${BACKEND_IMAGE##*:}"
        FRONTEND_TAG="${FRONTEND_IMAGE##*:}"
        KUSTOMIZATION="gitops/kustomize/overlays/prod/kustomization.yaml"

        echo "=== Updating Kustomize image tags to SHA: $SHORT_SHA ==="
        awk -v backend_tag="$BACKEND_TAG" -v frontend_tag="$FRONTEND_TAG" '
          $0 ~ /name: 10\.0\.0\.2:8083\/ecommerce\/backend/ { print; getline; sub(/newTag: .*/, "newTag: " backend_tag); print; next }
          $0 ~ /name: 10\.0\.0\.2:8083\/ecommerce\/frontend/ { print; getline; sub(/newTag: .*/, "newTag: " frontend_tag); print; next }
          { print }
        ' "$KUSTOMIZATION" > "$KUSTOMIZATION.tmp"
        mv "$KUSTOMIZATION.tmp" "$KUSTOMIZATION"

        git add -A
        git diff --staged --quiet && echo "No GitOps changes" && exit 0

        git commit -m "ci: update images to $SHORT_SHA

        Backend:  $BACKEND_IMAGE
        Frontend: $FRONTEND_IMAGE
        Triggered by commit: $COMMIT_SHA"
        git push origin "$(params.git-branch)"
        echo "=== GitOps manifests updated ==="
