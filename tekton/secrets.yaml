---
# tekton/secrets.yaml
# ATTENTION : Ne jamais commiter avec les vraies valeurs.
# Ces secrets doivent être créés via les commandes oc ci-dessous.
#
# Infrastructure :
#   Git (GitLab) : https://gitlab.itssolutions.it
#   Harbor       : http://10.0.0.2:8083
# =============================================================================

# ─── SECRET 1 : Harbor push (buildah push vers registry) ─────────────────────
#
# Rôle : Tekton l'utilise pour pousser les images buildées vers Harbor
#
# Prérequis Harbor :
#   1. Aller dans Harbor UI : http://10.0.0.2:8083
#   2. Projects → ecommerce → Robot Accounts → Add Robot Account
#   3. Nom : tekton
#   4. Permissions : Push/Pull sur le projet ecommerce
#   5. Harbor génère : robot$ecommerce+tekton + TOKEN (copier le token)
#
# Commande pour créer ce secret :
#   oc create secret docker-registry harbor-push-secret \
#     --docker-server=10.0.0.2:8083 \
#     --docker-username='robot$ecommerce+tekton' \
#     --docker-password='TOKEN_COPIÉ_DEPUIS_HARBOR' \
#     -n cicd
#
apiVersion: v1
kind: Secret
metadata:
  name: harbor-push-secret
  namespace: cicd
  annotations:
    tekton.dev/docker-0: http://10.0.0.2:8083
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>

---
# ─── SECRET 2 : GitLab SSH (clone code + push manifests GitOps) ──────────────
#
# Rôle : Tekton l'utilise pour :
#   - Cloner le code source depuis GitLab (étape git-clone)
#   - Pousser les manifests GitOps mis à jour (étape update-gitops)
#
# Prérequis GitLab :
#   1. Générer la clé SSH :
#      ssh-keygen -t ed25519 -C "tekton@itssolutions.it" -f /tmp/tekton-git -N ""
#
#   2. Ajouter la clé PUBLIQUE dans GitLab :
#      https://gitlab.itssolutions.it → projet → Settings → Repository
#      → Deploy Keys → Add new deploy key
#      → Coller /tmp/tekton-git.pub
#      → Cocher "Grant write permissions to this key" ✓
#
#   3. Créer le secret OpenShift :
#      oc create secret generic git-ssh-secret \
#        --from-file=ssh-privatekey=/tmp/tekton-git \
#        -n cicd
#
apiVersion: v1
kind: Secret
metadata:
  name: git-ssh-secret
  namespace: cicd
  annotations:
    tekton.dev/git-0: 10.0.0.2
type: kubernetes.io/ssh-auth
data:
  ssh-privatekey: <BASE64_ENCODED_SSH_PRIVATE_KEY>

---
# ─── SECRET 3 : Webhook HMAC (validation des webhooks GitLab) ────────────────
#
# Rôle : GitLab signe chaque webhook avec ce secret.
#        Tekton vérifie la signature pour rejeter les appels non autorisés.
#
# Prérequis GitLab :
#   1. Générer :   openssl rand -hex 32
#   2. Créer :
#      oc create secret generic webhook-secret \
#        --from-literal=secret='LA_VALEUR_GÉNÉRÉE' \
#        -n cicd
#   3. Dans GitLab :
#      https://gitlab.itssolutions.it → projet → Settings → Webhooks → Add webhook
#      URL    : https://webhook.itssolutions.it
#      Secret token : LA_MÊME_VALEUR
#      Trigger: Push events, branche main
#
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: cicd
type: Opaque
stringData:
  secret: CHANGEME_WEBHOOK_SECRET_RANDOM_STRING
