---
# tekton/secrets.yaml
# ATTENTION : Ne jamais commiter avec les vraies valeurs.
# Utiliser SealedSecrets ou External Secrets en production.
# Ces secrets doivent être créés manuellement avec les vraies valeurs.

# Harbor push credentials (robot account)
# Créer avec : oc create secret docker-registry harbor-push-secret \
#   --docker-server=10.0.0.2:8083 \
#   --docker-username='robot$ecommerce+tekton' \
#   --docker-password=<TOKEN> \
#   -n cicd
apiVersion: v1
kind: Secret
metadata:
  name: harbor-push-secret
  namespace: cicd
  annotations:
    tekton.dev/docker-0: http://10.0.0.2:8083
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG>
---
# Git SSH key (pour cloner et pusher les manifests GitOps)
# Générer : ssh-keygen -t ed25519 -C "tekton@cicd" -f /tmp/tekton-git
# Ajouter la clé publique dans GitLab/GitHub deploy keys (avec write access)
apiVersion: v1
kind: Secret
metadata:
  name: git-ssh-secret
  namespace: cicd
  annotations:
    tekton.dev/git-0: github.com
    tekton.dev/git-1: gitlab.com
type: kubernetes.io/ssh-auth
data:
  ssh-privatekey: <BASE64_ENCODED_SSH_PRIVATE_KEY>
---
# Token GitHub/GitLab pour webhook (validation HMAC)
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: cicd
type: Opaque
stringData:
  secret: CHANGEME_WEBHOOK_SECRET_RANDOM_STRING
