---
# gitops/argocd/project.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecommerce
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "E-Commerce Production Platform"
  sourceRepos:
    - '*'
  destinations:
    - namespace: ecommerce-prod
      server: https://kubernetes.default.svc
    - namespace: ecommerce-dev
      server: https://kubernetes.default.svc
    - namespace: cicd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'route.openshift.io'
      kind: Route
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: ci-role
      description: CI system peut synchroniser
      policies:
        - p, proj:ecommerce:ci-role, applications, sync, ecommerce/*, allow
        - p, proj:ecommerce:ci-role, applications, get, ecommerce/*, allow
