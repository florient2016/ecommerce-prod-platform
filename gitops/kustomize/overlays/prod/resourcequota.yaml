apiVersion: v1
kind: ResourceQuota
metadata:
  name: ecommerce-prod-quota
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "20"
    persistentvolumeclaims: "5"
    requests.storage: 100Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ecommerce-prod-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
