---
# gitops/kustomize/overlays/prod/secrets-template.yaml
# IMPORTANT: Ces secrets doivent être créés MANUELLEMENT ou via SealedSecrets/External Secrets.
# Ne JAMAIS commiter avec les vraies valeurs en clair.
# Créer avec les commandes oc ci-dessous.

# Commande pour créer postgres-secret :
# oc create secret generic postgres-secret \
#   --from-literal=POSTGRES_USER=ecommerce \
#   --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#   -n ecommerce-prod
#
# Commande pour créer backend-secret :
# DB_PASS=$(oc get secret postgres-secret -n ecommerce-prod -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)
# oc create secret generic backend-secret \
#   --from-literal=DATABASE_URL="postgresql://ecommerce:${DB_PASS}@postgres:5432/ecommerce_prod" \
#   --from-literal=JWT_SECRET=$(openssl rand -base64 64) \
#   -n ecommerce-prod

# Template vide (à ne pas appliquer directement)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ecommerce-prod
  annotations:
    # Utiliser SealedSecrets en production :
    # sealedsecrets.bitnami.com/managed: "true"
    helm.sh/resource-policy: keep
type: Opaque
# data:
#   POSTGRES_USER: <base64>
#   POSTGRES_PASSWORD: <base64>
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ecommerce-prod
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
# data:
#   DATABASE_URL: <base64>
#   JWT_SECRET: <base64>
---
# gitops/kustomize/overlays/prod/resourcequota.yaml
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ecommerce-prod-quota
  namespace: ecommerce-prod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    persistentvolumeclaims: "5"
    services: "10"
